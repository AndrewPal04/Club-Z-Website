<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Final Attendance Info</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9fbfd;
      padding: 40px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    form {
      max-width: 600px;
      margin: 0 auto;
    }
    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
    }
    textarea, input[type="date"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 4px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    textarea.input-error,
    input.input-error {
      border-color: #d32f2f;
    }
    .error-msg {
      display: block;
      color: #d32f2f;
      font-size: 12px;
      margin-top: 3px;
    }
    .char-counter {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
      display: block;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #0077cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <h2>Final Attendance Details</h2>
  <form id="finalForm" action="/submit-attendance-final" method="POST" novalidate>
    <label for="monthlyProgress">Monthly Progress</label>
    <textarea id="monthlyProgress" name="monthlyProgress" maxlength="400" rows="4"></textarea>
    <span id="progressCounter" class="char-counter">400 / 400 characters remaining</span>
    <span class="error-msg" id="progressErr"></span>

    <label for="reviewDate">Date Reviewed with Parent/Guardian</label>
    <input type="date" id="reviewDate" name="reviewDate">
    <span class="error-msg" id="dateErr"></span>

    <button type="submit">Generate PDF</button>
  </form>

  <script>
    const textarea = document.getElementById('monthlyProgress');
    const counter  = document.getElementById('progressCounter');

    textarea.addEventListener('input', () => {
      counter.textContent = `${400 - textarea.value.length} / 400 characters remaining`;
      clearError(textarea, 'progressErr');
    });

    document.getElementById('reviewDate').addEventListener('change', () => {
      clearError(document.getElementById('reviewDate'), 'dateErr');
    });

    function showError(el, errId, msg) {
      el.classList.add('input-error');
      document.getElementById(errId).textContent = msg;
    }

    function clearError(el, errId) {
      el.classList.remove('input-error');
      document.getElementById(errId).textContent = '';
    }

    document.getElementById('finalForm').addEventListener('submit', e => {
      let valid = true;
      if (!textarea.value.trim()) {
        showError(textarea, 'progressErr', 'Monthly progress is required.');
        valid = false;
      }
      const dateEl = document.getElementById('reviewDate');
      if (!dateEl.value) {
        showError(dateEl, 'dateErr', 'Review date is required.');
        valid = false;
      }
      if (!valid) e.preventDefault();
    });

    fetch('/draft/attendance/extra')
      .then(r => r.json())
      .then(data => {
        if (!data) return;
        if (data.progress_notes) {
          textarea.value = data.progress_notes;
          counter.textContent = `${400 - data.progress_notes.length} / 400 characters remaining`;
        }
        if (data.review_date) {
          document.getElementById('reviewDate').value = data.review_date;
        }
      });
  </script>
</body>
</html>
